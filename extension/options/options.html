<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmark Purpose Organizer Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="options-shell">
      <header>
        <h1>分類ルール</h1>
        <p>ルールは上からではなく `priority` の高い順に評価されます。</p>
      </header>
      <textarea id="rulesEditor" spellcheck="false" aria-label="分類ルール JSON"></textarea>
      <div class="actions">
        <button id="saveButton" type="button">保存</button>
        <button id="resetButton" type="button">初期ルールへ戻す</button>
      </div>
      <pre id="statusLog" aria-live="polite"></pre>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>

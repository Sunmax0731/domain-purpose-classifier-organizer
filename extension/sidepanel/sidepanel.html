<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmark Purpose Organizer</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Bookmark Purpose Organizer</h1>
          <p id="statusText">未スキャン</p>
        </div>
        <button id="scanButton" class="primary-button" type="button">スキャンして分類</button>
      </header>

      <section class="summary-grid" aria-label="分類サマリー">
        <article>
          <span>ブックマーク</span>
          <strong id="bookmarkCount">0</strong>
        </article>
        <article>
          <span>整理候補</span>
          <strong id="actionCount">0</strong>
        </article>
        <article>
          <span>作成予定</span>
          <strong id="folderCount">0</strong>
        </article>
      </section>

      <section class="panel-section">
        <div class="section-heading">
          <h2>分類結果</h2>
          <div class="section-actions">
            <button id="openOptionsButton" type="button">Side Panelで編集</button>
            <button id="openOptionsTabButton" type="button">別タブ</button>
          </div>
        </div>
        <div id="resultList" class="result-list empty">スキャンすると分類候補が表示されます。</div>
      </section>

      <section id="optionsPanel" class="panel-section options-embed-section" hidden>
        <div class="section-heading">
          <h2>分類ルール編集</h2>
          <button id="closeOptionsPanelButton" type="button">閉じる</button>
        </div>
        <iframe
          id="optionsFrame"
          class="options-frame"
          title="分類ルール Options"
          data-src="../options/options.html"
        ></iframe>
      </section>

      <section class="panel-section">
        <h2>変更プレビュー</h2>
        <div id="planList" class="plan-list empty">整理計画はまだありません。</div>
      </section>

      <section class="panel-section link-check-section">
        <div class="section-heading">
          <h2>リンク切れチェック</h2>
          <button id="checkLinksButton" type="button">リンク切れを確認</button>
        </div>
        <p id="linkCheckSummary">未チェックです。</p>
        <div id="brokenLinkList" class="broken-link-list empty">リンク切れ候補はまだありません。</div>
        <button id="deleteBrokenLinksButton" type="button" disabled>確認してリンク切れを削除</button>
      </section>

      <section class="panel-section backup-section">
        <div class="section-heading">
          <h2>テスト用バックアップ</h2>
          <button id="backupButton" type="button">現在状態をバックアップ</button>
        </div>
        <p id="backupStatusText">保存済みバックアップはありません。</p>
        <button id="restoreBackupButton" type="button" disabled>バックアップから復元</button>
      </section>

      <section class="danger-zone">
        <button id="applyButton" type="button" disabled>プレビュー済みの整理を適用</button>
        <button id="rollbackButton" type="button">直前の整理を復元</button>
      </section>

      <pre id="messageLog" class="message-log" aria-live="polite"></pre>
      <div id="restoreWarningList" class="warning-list" hidden></div>
    </main>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
